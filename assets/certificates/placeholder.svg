<svg xmlns="http://www.w3.org/2000/svg" width="600" height="420" viewBox="0 0 600 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f1a"/>
      <stop offset="100%" style="stop-color:#131629"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b6ef5"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
  </defs>
  <rect width="600" height="420" fill="url(#bg)" rx="16"/>
  <rect x="1" y="1" width="598" height="418" fill="none" stroke="url(#grad)" stroke-width="2" rx="16"/>
  <rect x="20" y="20" width="560" height="380" fill="none" stroke="rgba(91,110,245,0.2)" stroke-width="1" rx="12"/>
  <!-- Corner decorations -->
  <rect x="30" y="30" width="30" height="3" fill="#5b6ef5" rx="2"/>
  <rect x="30" y="30" width="3" height="30" fill="#5b6ef5" rx="2"/>
  <rect x="540" y="30" width="30" height="3" fill="#00d4aa" rx="2"/>
  <rect x="567" y="30" width="3" height="30" fill="#00d4aa" rx="2"/>
  <rect x="30" y="387" width="30" height="3" fill="#00d4aa" rx="2"/>
  <rect x="30" y="360" width="3" height="30" fill="#00d4aa" rx="2"/>
  <rect x="540" y="387" width="30" height="3" fill="#5b6ef5" rx="2"/>
  <rect x="567" y="360" width="3" height="30" fill="#5b6ef5" rx="2"/>
  <!-- Trophy -->
  <text x="300" y="105" text-anchor="middle" font-size="52">🏆</text>
  <!-- Certificate of Completion -->
  <text x="300" y="150" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#8891b4" letter-spacing="4">CERTIFICATE OF COMPLETION</text>
  <!-- Divider -->
  <line x1="100" y1="165" x2="500" y2="165" stroke="url(#grad)" stroke-width="1" opacity="0.5"/>
  <!-- This certifies -->
  <text x="300" y="195" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4a5180">This certifies that</text>
  <!-- Name -->
  <text x="300" y="240" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold" fill="url(#grad)">Sushant Ashok Dhete</text>
  <!-- has successfully completed -->
  <text x="300" y="268" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4a5180">has successfully completed</text>
  <!-- Course name placeholder -->
  <text x="300" y="300" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="600" fill="#e8eaf6">[ Certificate Name ]</text>
  <!-- Divider -->
  <line x1="100" y1="320" x2="500" y2="320" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Footer -->
  <text x="150" y="355" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4a5180">ISSUED BY</text>
  <text x="150" y="373" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#8891b4">Platform Name</text>
  <text x="300" y="355" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4a5180">DATE</text>
  <text x="300" y="373" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#8891b4">2024</text>
  <text x="450" y="355" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4a5180">CREDENTIAL ID</text>
  <text x="450" y="373" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#8891b4">SAD-2024-XXXX</text>
  <!-- Verified badge -->
  <rect x="235" y="385" width="130" height="22" fill="rgba(0,212,170,0.1)" stroke="rgba(0,212,170,0.3)" stroke-width="1" rx="11"/>
  <text x="300" y="400" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#00d4aa">✓ VERIFIED CERTIFICATE</text>
</svg>
