<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06070d"/>
      <stop offset="100%" style="stop-color:#131629"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b6ef5"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#5b6ef5;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#5b6ef5;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Top border gradient line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#g1)"/>
  <!-- Avatar circle -->
  <circle cx="200" cy="315" r="130" fill="#131629" stroke="url(#g1)" stroke-width="3"/>
  <text x="200" y="340" text-anchor="middle" font-family="serif" font-size="72" font-weight="800" fill="url(#g1)">SAD</text>
  <!-- Name -->
  <text x="420" y="240" font-family="sans-serif" font-size="54" font-weight="800" fill="#e8eaf6">Sushant Ashok Dhete</text>
  <!-- Role -->
  <text x="420" y="295" font-family="sans-serif" font-size="24" fill="#8891b4">AI Developer · Web Developer · Automation Enthusiast</text>
  <!-- Tags row -->
  <rect x="420" y="325" width="130" height="36" fill="rgba(91,110,245,0.15)" stroke="rgba(91,110,245,0.3)" stroke-width="1" rx="18"/>
  <text x="485" y="348" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#7b8fff">🤖 AI Dev</text>
  <rect x="565" y="325" width="130" height="36" fill="rgba(0,212,170,0.12)" stroke="rgba(0,212,170,0.3)" stroke-width="1" rx="18"/>
  <text x="630" y="348" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#00d4aa">🌐 Web Dev</text>
  <rect x="710" y="325" width="150" height="36" fill="rgba(245,200,66,0.1)" stroke="rgba(245,200,66,0.3)" stroke-width="1" rx="18"/>
  <text x="785" y="348" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#f5c842">⚡ Automation</text>
  <!-- Quote -->
  <text x="420" y="415" font-family="sans-serif" font-size="18" fill="#4a5180" font-style="italic">"Building intelligent digital solutions through AI, automation</text>
  <text x="420" y="440" font-family="sans-serif" font-size="18" fill="#4a5180" font-style="italic">and modern web technologies."</text>
  <!-- URL -->
  <text x="420" y="510" font-family="monospace" font-size="18" fill="#5b6ef5">sushantdhete.github.io</text>
  <!-- India flag -->
  <text x="420" y="555" font-family="sans-serif" font-size="16" fill="#4a5180">📍 Nagpur, Maharashtra, India 🇮🇳</text>
</svg>
